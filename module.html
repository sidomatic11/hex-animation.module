<div class="hex-animation-wrapper" style="height: {{ module.module_height }}px;">
  <canvas
    id="hex-canvas-{{ name }}"
    class="hex-animation-canvas"
    data-bg="{{ module.bg_color.color }}"
    data-circle="{{ module.circle_color.color }}"
    data-hex="{{ module.hex_color.color }}"
    data-speed="{{ module.loop_speed }}"
    data-sensitivity="{{ module.mouse_sensitivity }}"
  ></canvas>
</div>
